            <h1>Course Proposal Application</h1>
<form method="get" action="thanks.html">
    <fieldset>
        <legend> Applicant Information</legend>
        <label>First Name*</label><input type="text" name="fname" required>
        <label>Last Name*</label><input type="text" name="lname" required>
        <label>Phone</label><input type="tel" name="phone" placeholder="123444555">
        <label>Email*</label><input type="text" name="email" placeholder = "someone@gmail.com" required>
        <label>website</label><input type="url" name="url" placeholder="https://">
    </fieldset>
    
    <fieldset>
        <legend>Course Information</legend>
        <div>Audience</div>
        <label><input type="radio" name="audience" value="beginner">Beginner</label>
        <label><input type="radio" name="audience" value="beginner">Intermediate</label>
        <label><input type="radio" name="audience" value="beginner">Advanced</label>

        <div>Software Needed</div>
        <label><input type="checkbox" name="editing" value="yes">Photo Editor</label>
        <label><input type="checkbox" name="coding" value="yes">Coding</label>
        <label><input type="checkbox" name="process" value="yes">Preprocessor</label>
        <label><input type="checkbox" name="client" value="yes">FTP Client</label>
    </fieldset>

    <fieldset>
        <legend>Funding</legend>
        <label>Anticipated Completion Date <input type="date" name="completed date"></label>
        <label>Core subject
            <select name="subject">
                <option value="">Please Select</option>
                <option value="software">Software Dev</option>
                <option value="creative">Creative Professional</option>
                <option value="info">Information Tech</option>
                <option value="data">Data Professional</option>
            </select>
        </label>
        <label>How Many Authors <input type="number" name="author"></label>
    
        
    </fieldset>
    <input type="submit" value="Propose My Course"> 




</form>
