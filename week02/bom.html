<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of Mormon</title>
    <meta name="author" content="victoria lutz">
    <meta name="description" content="This app allows users to enter their favorite Book of Mormon chapters and display them on a list that is updated automatically on the screen.">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="./scripts/scripts.js" defer></script>
</head>
<body>
    <h1>📖 Book of Mormon - Top 10</h1>
<main>
	<label for="favchap">Enter Book and Chapter: </label>
	<input type="text" id="favchap" placeholder="Alma 5">
	<button type="submit">Add Chapter</button>
	<ul id="list"></ul>
</main>
</body>
</html>
